name: Integration Tests

on:
  pull_request:
    branches: [main]

jobs:
  integration:
    runs-on: ubuntu-latest
    env:
      # Set these in your GitHub repo → Settings → Secrets and variables → Actions.
      # If not set, integration tests that require Amadeus will be skipped automatically.
      AMADEUS_API_KEY: ${{ secrets.AMADEUS_API_KEY }}
      AMADEUS_API_SECRET: ${{ secrets.AMADEUS_API_SECRET }}
      AMADEUS_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install -r requirements.txt
      - name: Run integration tests
        run: pytest tests/integration/ -v -m integration
      - name: Run demo scripts
        run: |
          for script in scripts/demo_*.py; do
            [ -f "$script" ] && python "$script" || true
          done
